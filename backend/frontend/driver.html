<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Discra Driver App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/styles.css?v=20260323b">
  <link rel="manifest" href="assets/driver-manifest.json">
</head>
<body class="theme-admin">
  <div class="app-shell">
    <header class="topbar-slim">
      <div class="topbar-slim-left">
        <div class="topbar-logo-mark">D</div>
        <span class="topbar-brand">Discra</span>
      </div>
      <div class="topbar-slim-center">
        <span class="topbar-subtitle">Driver</span>
      </div>
      <div class="topbar-slim-right">
        <span id="driver-auth-state" class="status-pill status-idle">Not Signed In</span>
        <a class="topbar-link" href="register">Registration</a>
        <a class="topbar-link" href="admin">Admin</a>
        <button id="driver-logout-hosted-ui" class="btn btn-ghost btn-sm" type="button">Logout</button>
      </div>
    </header>

    <main class="driver-main">
      <!-- Shift Controls -->
      <section class="driver-shift-panel">
        <div class="driver-shift-row">
          <div class="driver-shift-info">
            <h3>Shift Controls</h3>
            <p id="location-status" class="driver-shift-status">Auto share is off.</p>
          </div>
          <div class="driver-shift-actions">
            <button id="send-location-now" class="btn btn-accent btn-sm" type="button">Send Location</button>
            <button id="start-location-share" class="btn btn-primary btn-sm" type="button">Start Auto Share</button>
            <button id="stop-location-share" class="btn btn-ghost btn-sm" type="button">Stop</button>
            <button id="refresh-inbox" class="btn btn-ghost btn-sm" type="button">Refresh</button>
          </div>
        </div>
      </section>

      <!-- Assigned Orders -->
      <section class="driver-orders-section">
        <div id="driver-orders" class="driver-orders-grid"></div>
        <p id="driver-orders-message" class="message"></p>
      </section>

      <!-- Session Settings (collapsed) -->
      <section class="driver-session-panel">
        <details class="session-details">
          <summary class="driver-session-summary">Session &amp; Auth Settings</summary>
          <div class="driver-session-body">
            <div id="driver-dev-auth-panel" class="dev-auth-panel" hidden>
              <p class="panel-help">Quick test sign-in (no token required)</p>
              <div id="driver-dev-auth-actions" class="row"></div>
            </div>

            <details class="auth-config">
              <summary>Hosted UI login</summary>
              <label class="field">
                <span>Cognito Hosted UI Domain</span>
                <input id="driver-cognito-domain" placeholder="your-domain.auth.us-east-1.amazoncognito.com">
              </label>
              <label class="field">
                <span>Client ID</span>
                <input id="driver-cognito-client-id" placeholder="app client id">
              </label>
              <div class="row">
                <button id="driver-login-hosted-ui" class="btn btn-accent" type="button">Login Hosted UI</button>
              </div>
            </details>

            <details id="driver-auth-debug" class="auth-config" hidden>
              <summary>Debug Token Override</summary>
              <label class="field">
                <span>JWT Token</span>
                <textarea id="driver-jwt-token" rows="5" placeholder="Paste id_token here"></textarea>
              </label>
              <div class="row">
                <button id="driver-save-token" class="btn btn-primary" type="button">Save Token</button>
                <button id="driver-clear-token" class="btn btn-ghost" type="button">Clear</button>
              </div>
              <pre id="driver-claims-view" class="claims-view">No active web session.</pre>
            </details>
            <p id="driver-auth-message" class="message"></p>
          </div>
        </details>
      </section>
    </main>
  </div>

  <script src="assets/common.js?v=20260323b"></script>
  <script src="assets/driver.js?v=20260323b"></script>
</body>
</html>
