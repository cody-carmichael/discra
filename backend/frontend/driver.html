<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Discra Driver</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
  <link rel="manifest" href="assets/driver-manifest.json">
  <meta name="theme-color" content="#0b1117">
  <link rel="stylesheet" href="assets/driver-mobile.css?v=20260326c">
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="drv-login">
    <div class="drv-login-card">
      <div class="drv-login-logo">D</div>
      <h1 class="drv-login-title">Discra</h1>
      <p class="drv-login-sub">Driver</p>
      <button id="login-screen-btn" class="drv-btn drv-btn-accent drv-login-btn" type="button">Sign In</button>
      <p id="login-screen-message" class="drv-msg"></p>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="app-shell" class="drv-shell" style="display:none;">
    <!-- TOP BAR -->
    <header class="drv-topbar">
      <div class="drv-topbar-left">
        <div class="drv-logo">D</div>
        <span class="drv-brand">Discra</span>
      </div>
      <div class="drv-topbar-right">
        <span id="driver-auth-state" class="drv-status-pill drv-status-off">Offline</span>
        <button id="profile-btn" class="drv-profile-btn" type="button" title="Profile">
          <span id="profile-avatar" class="drv-profile-avatar">?</span>
        </button>
        <button id="driver-logout-hosted-ui" class="drv-btn drv-btn-ghost drv-btn-sm" type="button">Logout</button>
      </div>
    </header>

    <!-- MAP (full-screen behind UI) -->
    <div id="driver-map" class="drv-map"></div>

    <!-- LOCATION STATUS BAR -->
    <div id="location-bar" class="drv-location-bar">
      <span id="location-status" class="drv-loc-text">Connecting...</span>
    </div>

    <!-- ROUTE PROMPT OVERLAY -->
    <div id="route-prompt" class="drv-route-prompt" style="display:none;">
      <span id="route-prompt-text">Route to Pickup?</span>
      <div class="drv-route-prompt-btns">
        <button id="route-go" class="drv-btn drv-btn-accent drv-btn-sm">Go</button>
        <button id="route-cancel" class="drv-btn drv-btn-ghost drv-btn-sm">Cancel</button>
      </div>
    </div>

    <!-- ROUTE STATS -->
    <div id="route-stats" class="drv-route-stats" style="display:none;">
      <span id="route-stats-text"></span>
    </div>

    <!-- BOTTOM SHEET: Orders & Directions -->
    <div id="bottom-sheet" class="drv-sheet collapsed">
      <div class="drv-sheet-handle" id="sheet-handle"><div class="drv-sheet-bar"></div></div>
      <div class="drv-sheet-tabs">
        <button class="drv-sheet-tab active" data-tab="stops">My Stops <span id="stop-count" class="drv-stop-count">0</span></button>
        <button class="drv-sheet-tab" data-tab="directions">Directions</button>
      </div>
      <div class="drv-sheet-tab-content">
        <div id="tab-stops" class="drv-tab-pane active">
          <div class="drv-sheet-tab-header">
            <button id="refresh-inbox" class="drv-btn drv-btn-ghost drv-btn-sm" type="button">Refresh</button>
          </div>
          <div id="driver-orders" class="drv-orders-list"></div>
          <p id="driver-orders-message" class="drv-msg"></p>
        </div>
        <div id="tab-directions" class="drv-tab-pane">
          <div id="directions-list" class="drv-directions-list">
            <div class="drv-empty"><div class="drv-empty-icon">&#x1F9ED;</div><div class="drv-empty-text">Select a stop and tap Go to see directions</div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ORDER DETAIL SLIDE-UP -->
    <div id="driver-detail-panel" class="drv-detail" style="display:none;">
      <div class="drv-detail-header">
        <h3 id="detail-customer-name">Order Details</h3>
        <button id="detail-close" class="drv-close-btn" type="button">&times;</button>
      </div>
      <div id="detail-body" class="drv-detail-body"></div>
    </div>

    <!-- PROFILE MODAL -->
    <div id="profile-modal" class="drv-detail" style="display:none;">
      <div class="drv-detail-header">
        <h3>My Profile</h3>
        <button id="profile-close" class="drv-close-btn" type="button">&times;</button>
      </div>
      <div class="drv-detail-body">
        <form id="profile-form">
          <div class="drv-detail-section">
            <div class="drv-detail-label">PHOTO</div>
            <div class="drv-profile-photo-row">
              <div id="profile-photo-preview" class="drv-profile-photo-preview">?</div>
              <div class="drv-field" style="flex:1;">
                <span class="drv-field-label">Profile Photo</span>
                <label class="drv-file-upload-btn">
                  <input id="profile-photo-file" type="file" accept="image/*" capture="environment" style="display:none;">
                  <span class="drv-btn drv-btn-ghost drv-btn-sm" style="width:100%;text-align:center;">Choose Photo</span>
                </label>
                <input id="profile-photo-url" type="hidden">
              </div>
            </div>
          </div>
          <div class="drv-detail-section">
            <div class="drv-field">
              <span class="drv-field-label">Phone</span>
              <input id="profile-phone" type="tel" class="drv-input" placeholder="(555) 123-4567">
            </div>
          </div>
          <div class="drv-detail-section">
            <div class="drv-field">
              <span class="drv-field-label">Email</span>
              <input id="profile-email" type="email" class="drv-input" placeholder="you@email.com">
            </div>
          </div>
          <div class="drv-detail-section">
            <label class="drv-toggle-row">
              <input id="profile-tsa" type="checkbox">
              <span class="drv-toggle-label">TSA Certified</span>
            </label>
          </div>
          <p id="profile-message" class="drv-msg"></p>
          <button type="submit" class="drv-btn drv-btn-accent" style="width:100%;">Save Profile</button>
        </form>
      </div>
    </div>
  </div>

  <!-- SESSION SETTINGS (hidden) -->
  <div id="session-drawer" style="display:none;">
    <div id="driver-dev-auth-panel" class="dev-auth-panel" hidden>
      <div id="driver-dev-auth-actions" class="row"></div>
    </div>
    <input id="driver-cognito-domain" type="hidden">
    <input id="driver-cognito-client-id" type="hidden">
    <button id="driver-login-hosted-ui" type="button" hidden>Login</button>
    <details id="driver-auth-debug" hidden>
      <textarea id="driver-jwt-token" hidden></textarea>
      <button id="driver-save-token" type="button" hidden>Save</button>
      <button id="driver-clear-token" type="button" hidden>Clear</button>
      <pre id="driver-claims-view" hidden></pre>
    </details>
    <p id="driver-auth-message" class="drv-msg"></p>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="assets/common.js?v=20260326c"></script>
  <script src="assets/driver.js?v=20260326c"></script>
</body>
</html>
