AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Discra API - dual-stack migration (Java + Python backend)

Parameters:
  Version:
    Type: String
    Default: 0.0.1-tracer
    Description: Deployed version string (use Git SHA in CI)
  AdminToken:
    Type: String
    NoEcho: true
    Description: Admin token for /admin routes (dev only)
  CognitoUserPoolId:
    Type: String
    Default: us-east-1_examplepool
    Description: Cognito User Pool ID used by API Gateway JWT authorizer
  CognitoAppClientId:
    Type: String
    Default: exampleclientid
    Description: Cognito App Client ID (JWT audience)
  OrsApiKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: OpenRouteService API key for directions and matrix (free tier 2000 req/day)
  LocationRouteCalculatorName:
    Type: String
    Default: ""
    Description: Optional Amazon Location route calculator name for matrix calls
  LocationPlaceIndexName:
    Type: String
    Default: ""
    Description: Optional Amazon Location place index name for address geocoding
  StripeSecretKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Optional Stripe secret key for subscription seat updates
  StripeWebhookSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: Optional Stripe webhook signing secret
  StripeDispatcherPriceId:
    Type: String
    Default: ""
    Description: Optional Stripe price id for dispatcher seats
  StripeDriverPriceId:
    Type: String
    Default: ""
    Description: Optional Stripe price id for driver seats
  OrdersWebhookToken:
    Type: String
    Default: ""
    NoEcho: true
    Description: Shared secret for external order-ingest webhook
  OrdersWebhookAllowedOrgId:
    Type: String
    Default: ""
    Description: Required org_id allowed for external order-ingest webhook payloads
  OrdersWebhookHmacSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: Optional HMAC secret for signed external order-ingest webhook payloads
  OrdersWebhookMaxSkewSeconds:
    Type: String
    Default: "300"
    Description: Allowed clock skew in seconds for signed external order-ingest webhooks
  CognitoHostedUiDomain:
    Type: String
    Default: ""
    Description: Optional Cognito hosted UI domain for frontend login helpers
  FrontendMapStyleUrl:
    Type: String
    Default: https://demotiles.maplibre.org/style.json
    Description: MapLibre style JSON URL used by Admin/Dispatcher map view
  EnableUiDevAuth:
    Type: String
    Default: "true"
    Description: Enable cookie-based UI dev auth profiles for no-token manual testing
  DevAuthSecret:
    Type: String
    Default: discra-dev-auth-secret
    NoEcho: true
    Description: Signing secret for UI dev-auth session cookies (dev only)
  UiDevAuthOrgId:
    Type: String
    Default: org-pilot-1
    Description: Default org id bound to UI dev-auth profiles
  UiDevAuthTtlSeconds:
    Type: String
    Default: "43200"
    Description: Session TTL (seconds) for UI dev-auth cookies
  UiDevAuthAdminUserId:
    Type: String
    Default: test-admin
    Description: User id for default Admin dev-auth profile
  UiDevAuthAdminEmail:
    Type: String
    Default: ""
    Description: Optional email for default Admin dev-auth profile
  UiDevAuthDispatcherUserId:
    Type: String
    Default: test-dispatcher
    Description: User id for default Dispatcher dev-auth profile
  UiDevAuthDispatcherEmail:
    Type: String
    Default: ""
    Description: Optional email for default Dispatcher dev-auth profile
  UiDevAuthDriverUserId:
    Type: String
    Default: test-driver
    Description: User id for default Driver dev-auth profile
  UiDevAuthDriverEmail:
    Type: String
    Default: ""
    Description: Optional email for default Driver dev-auth profile
  EnableOnboardingFlow:
    Type: String
    Default: "true"
    Description: Enable tenant admin onboarding registration and review APIs/UI
  OnboardingApproverEmailAllowlist:
    Type: String
    Default: ""
    Description: Comma-separated email allowlist for App Dev approvers
  OnboardingLinkSigningSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: HMAC signing secret for onboarding review links
  OnboardingLinkTtlSeconds:
    Type: String
    Default: "172800"
    Description: Signed review link expiry in seconds
  OnboardingCognitoOrgAttributeKey:
    Type: String
    Default: custom:org_id
    Description: Cognito user attribute key that stores approved org id
  OnboardingSesFromEmail:
    Type: String
    Default: ""
    Description: SES verified sender/from email for onboarding notifications
  OnboardingAppReviewUrlBase:
    Type: String
    Default: ""
    Description: Absolute review page URL base used in review emails (for example https://app.example.com/dev/backend/ui/review)
  OnboardingAppRegisterUrlBase:
    Type: String
    Default: ""
    Description: Absolute registration page URL base used in approval/rejection emails
  VapidPublicKey:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /discra/vapid-public-key
    Description: VAPID public key (URL-safe base64) for Web Push notifications
  VapidPrivateKey:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /discra/vapid-private-key
    Description: VAPID private key for signing Web Push messages
  VapidClaimEmail:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /discra/vapid-claim-email
    Description: Contact email for VAPID claims (mailto:you@example.com)

Globals:
  Function:
    Runtime: java21
    MemorySize: 512
    Timeout: 10
    Tracing: Active
    Architectures: [ x86_64 ]
    Environment:
      Variables:
        VERSION: !Ref Version
    Tags:
      App: Discra
      Env: dev
      Owner: Cody
  Api:
    Cors:
      AllowOrigins: "'*'"
      AllowMethods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
      AllowHeaders: "'content-type,x-admin-token,authorization,x-correlation-id'"

Resources:
  DiscraApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: dev
      Auth:
        Authorizers:
          CognitoJwtAuthorizer:
            IdentitySource: "$request.header.Authorization"
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPoolId}"
              audience:
                - !Ref CognitoAppClientId
      Tags: { App: Discra, Env: dev }

  OrganizationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "discra-organizations-${AWS::StackName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: org_id
          AttributeType: S
      KeySchema:
        - AttributeName: org_id
          KeyType: HASH
      Tags:
        - Key: App
          Value: Discra
        - Key: Env
          Value: dev

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "discra-users-${AWS::StackName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: org_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: org_id
          KeyType: HASH
        - AttributeName: user_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: user_id_index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: App
          Value: Discra
        - Key: Env
          Value: dev

  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "discra-orders-${AWS::StackName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: org_id
          AttributeType: S
        - AttributeName: id
          AttributeType: S
        - AttributeName: assigned_driver_id
          AttributeType: S
      KeySchema:
        - AttributeName: org_id
          KeyType: HASH
        - AttributeName: id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: orders_by_assigned_driver
          KeySchema:
            - AttributeName: org_id
              KeyType: HASH
            - AttributeName: assigned_driver_id
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: App
          Value: Discra
        - Key: Env
          Value: dev

  PodArtifactsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "discra-pod-artifacts-${AWS::StackName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: org_id
          AttributeType: S
        - AttributeName: pod_id
          AttributeType: S
      KeySchema:
        - AttributeName: org_id
          KeyType: HASH
        - AttributeName: pod_id
          KeyType: RANGE
      Tags:
        - Key: App
          Value: Discra
        - Key: Env
          Value: dev

  DriverLocationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "discra-driver-locations-${AWS::StackName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: org_id
          AttributeType: S
        - AttributeName: driver_id
          AttributeType: S
      KeySchema:
        - AttributeName: org_id
          KeyType: HASH
        - AttributeName: driver_id
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at_epoch
        Enabled: true
      Tags:
        - Key: App
          Value: Discra
        - Key: Env
          Value: dev

  PushSubscriptionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "discra-push-subscriptions-${AWS::StackName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: org_id
          AttributeType: S
        - AttributeName: driver_id
          AttributeType: S
      KeySchema:
        - AttributeName: org_id
          KeyType: HASH
        - AttributeName: driver_id
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: expires_at_epoch
        Enabled: true
      Tags:
        - Key: App
          Value: Discra
        - Key: Env
          Value: dev

  SeatSubscriptionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "discra-seat-subscriptions-${AWS::StackName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: org_id
          AttributeType: S
      KeySchema:
        - AttributeName: org_id
          KeyType: HASH
      Tags:
        - Key: App
          Value: Discra
        - Key: Env
          Value: dev

  SeatInvitationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "discra-seat-invitations-${AWS::StackName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: org_id
          AttributeType: S
        - AttributeName: invitation_id
          AttributeType: S
      KeySchema:
        - AttributeName: org_id
          KeyType: HASH
        - AttributeName: invitation_id
          KeyType: RANGE
      Tags:
        - Key: App
          Value: Discra
        - Key: Env
          Value: dev

  AuditLogsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "discra-audit-logs-${AWS::StackName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: org_id
          AttributeType: S
        - AttributeName: event_id
          AttributeType: S
      KeySchema:
        - AttributeName: org_id
          KeyType: HASH
        - AttributeName: event_id
          KeyType: RANGE
      Tags:
        - Key: App
          Value: Discra
        - Key: Env
          Value: dev

  OnboardingRegistrationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "discra-onboarding-registrations-${AWS::StackName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: registration_id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: updated_at_epoch
          AttributeType: N
      KeySchema:
        - AttributeName: registration_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: registrations_by_status
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: updated_at_epoch
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: App
          Value: Discra
        - Key: Env
          Value: dev

  PodArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - "*"
            AllowedMethods:
              - POST
              - PUT
            AllowedHeaders:
              - "*"
            MaxAge: 300
      Tags:
        - Key: App
          Value: Discra
        - Key: Env
          Value: dev

  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: com.discra.api.HealthHandler::handleRequest
      Events:
        HealthGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiscraApi
            Path: /health
            Method: GET
      Tags: { App: Discra, Env: dev }

  VersionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: com.discra.api.VersionHandler::handleRequest
      Events:
        VersionGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiscraApi
            Path: /version
            Method: GET
      Tags: { App: Discra, Env: dev }

  AdminPingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: com.discra.api.AdminPingHandler::handleRequest
      Environment:
        Variables:
          ADMIN_TOKEN: !Ref AdminToken
      Events:
        AdminPingGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiscraApi
            Path: /admin/ping
            Method: GET
      Tags: { App: Discra, Env: dev }

  BackendApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: python3.12
      CodeUri: backend
      Handler: app.handler
      MemorySize: 512
      Timeout: 15
      Tracing: Active
      Environment:
        Variables:
          VERSION: !Ref Version
          COGNITO_ISSUER: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPoolId}"
          COGNITO_AUDIENCE: !Ref CognitoAppClientId
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          JWT_VERIFY_SIGNATURE: "true"
          ORGANIZATIONS_TABLE: !Ref OrganizationsTable
          USERS_TABLE: !Ref UsersTable
          ORDERS_TABLE: !Ref OrdersTable
          POD_BUCKET_NAME: !Ref PodArtifactsBucket
          POD_ARTIFACTS_TABLE: !Ref PodArtifactsTable
          POD_UPLOAD_URL_EXPIRES_SECONDS: "300"
          DRIVER_LOCATIONS_TABLE: !Ref DriverLocationsTable
          DRIVER_LOCATION_TTL_SECONDS: "7200"
          LOCATION_ROUTE_CALCULATOR_NAME: !Ref LocationRouteCalculatorName
          LOCATION_PLACE_INDEX_NAME: !Ref LocationPlaceIndexName
          ORS_API_KEY: !Ref OrsApiKey
          USE_IN_MEMORY_ROUTE_MATRIX: "false"
          ROUTE_OPTIMIZATION_TIMEOUT_SECONDS: "5"
          SEAT_SUBSCRIPTIONS_TABLE: !Ref SeatSubscriptionsTable
          SEAT_INVITATIONS_TABLE: !Ref SeatInvitationsTable
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
          STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
          STRIPE_DISPATCHER_PRICE_ID: !Ref StripeDispatcherPriceId
          STRIPE_DRIVER_PRICE_ID: !Ref StripeDriverPriceId
          ORDERS_WEBHOOK_TOKEN: !Ref OrdersWebhookToken
          ORDERS_WEBHOOK_ALLOWED_ORG_ID: !Ref OrdersWebhookAllowedOrgId
          ORDERS_WEBHOOK_HMAC_SECRET: !Ref OrdersWebhookHmacSecret
          ORDERS_WEBHOOK_MAX_SKEW_SECONDS: !Ref OrdersWebhookMaxSkewSeconds
          AUDIT_LOGS_TABLE: !Ref AuditLogsTable
          PUSH_SUBSCRIPTIONS_TABLE: !Ref PushSubscriptionsTable
          VAPID_PUBLIC_KEY: !Ref VapidPublicKey
          VAPID_PRIVATE_KEY: !Ref VapidPrivateKey
          VAPID_CLAIM_EMAIL: !Ref VapidClaimEmail
          COGNITO_HOSTED_UI_DOMAIN: !Ref CognitoHostedUiDomain
          FRONTEND_COGNITO_CLIENT_ID: !Ref CognitoAppClientId
          FRONTEND_MAP_STYLE_URL: !Ref FrontendMapStyleUrl
          ENABLE_UI_DEV_AUTH: !Ref EnableUiDevAuth
          DEV_AUTH_SECRET: !Ref DevAuthSecret
          UI_DEV_AUTH_ORG_ID: !Ref UiDevAuthOrgId
          UI_DEV_AUTH_TTL_SECONDS: !Ref UiDevAuthTtlSeconds
          UI_DEV_AUTH_ADMIN_USER_ID: !Ref UiDevAuthAdminUserId
          UI_DEV_AUTH_ADMIN_EMAIL: !Ref UiDevAuthAdminEmail
          UI_DEV_AUTH_DISPATCHER_USER_ID: !Ref UiDevAuthDispatcherUserId
          UI_DEV_AUTH_DISPATCHER_EMAIL: !Ref UiDevAuthDispatcherEmail
          UI_DEV_AUTH_DRIVER_USER_ID: !Ref UiDevAuthDriverUserId
          UI_DEV_AUTH_DRIVER_EMAIL: !Ref UiDevAuthDriverEmail
          ENABLE_ONBOARDING_FLOW: !Ref EnableOnboardingFlow
          ONBOARDING_REGISTRATIONS_TABLE: !Ref OnboardingRegistrationsTable
          ONBOARDING_REGISTRATIONS_STATUS_INDEX: registrations_by_status
          ONBOARDING_APPROVER_EMAIL_ALLOWLIST: !Ref OnboardingApproverEmailAllowlist
          ONBOARDING_LINK_SIGNING_SECRET: !Ref OnboardingLinkSigningSecret
          ONBOARDING_LINK_TTL_SECONDS: !Ref OnboardingLinkTtlSeconds
          ONBOARDING_COGNITO_ORG_ATTRIBUTE_KEY: !Ref OnboardingCognitoOrgAttributeKey
          ONBOARDING_SES_FROM_EMAIL: !Ref OnboardingSesFromEmail
          ONBOARDING_APP_REVIEW_URL_BASE: !Ref OnboardingAppReviewUrlBase
          ONBOARDING_APP_REGISTER_URL_BASE: !Ref OnboardingAppRegisterUrlBase
      Policies:
        - Statement:
            Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:PutItem
              - dynamodb:UpdateItem
              - dynamodb:Query
              - dynamodb:Scan
            Resource:
              - !GetAtt OrganizationsTable.Arn
              - !GetAtt UsersTable.Arn
              - !Sub "${UsersTable.Arn}/index/*"
              - !GetAtt OrdersTable.Arn
              - !Sub "${OrdersTable.Arn}/index/*"
              - !GetAtt PodArtifactsTable.Arn
              - !GetAtt DriverLocationsTable.Arn
              - !GetAtt SeatSubscriptionsTable.Arn
              - !GetAtt SeatInvitationsTable.Arn
              - !GetAtt AuditLogsTable.Arn
              - !GetAtt PushSubscriptionsTable.Arn
              - !GetAtt OnboardingRegistrationsTable.Arn
              - !Sub "${OnboardingRegistrationsTable.Arn}/index/*"
        - Statement:
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:AbortMultipartUpload
            Resource: !Sub "${PodArtifactsBucket.Arn}/*"
        - Statement:
            Effect: Allow
            Action:
              - geo:CalculateRouteMatrix
              - geo:SearchPlaceIndexForText
            Resource: "*"
        - Statement:
            Effect: Allow
            Action:
              - cognito-idp:AdminAddUserToGroup
              - cognito-idp:AdminUpdateUserAttributes
            Resource: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}"
        - Statement:
            Effect: Allow
            Action:
              - ses:SendEmail
              - ses:SendRawEmail
            Resource: "*"
      Events:
        BackendHealthGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiscraApi
            Path: /backend/health
            Method: GET
        BackendVersionGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiscraApi
            Path: /backend/version
            Method: GET
        BackendUiHomeGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiscraApi
            Path: /backend/ui
            Method: GET
        BackendUiAdminGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiscraApi
            Path: /backend/ui/admin
            Method: GET
        BackendUiAdminServiceWorkerGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiscraApi
            Path: /backend/ui/admin-sw.js
            Method: GET
        BackendUiDriverGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiscraApi
            Path: /backend/ui/driver
            Method: GET
        BackendUiRegisterGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiscraApi
            Path: /backend/ui/register
            Method: GET
        BackendUiReviewGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiscraApi
            Path: /backend/ui/review
            Method: GET
        BackendUiDriverServiceWorkerGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiscraApi
            Path: /backend/ui/driver-sw.js
            Method: GET
        BackendUiConfigGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiscraApi
            Path: /backend/ui/config
            Method: GET
        BackendUiAssetsProxyGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiscraApi
            Path: /backend/ui/assets/{proxy+}
            Method: GET
        BackendStripeWebhookPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiscraApi
            Path: /backend/webhooks/stripe
            Method: POST
        BackendOrdersWebhookPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiscraApi
            Path: /backend/webhooks/orders
            Method: POST
        BackendProtectedProxyGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiscraApi
            Path: /backend/{proxy+}
            Method: GET
        BackendProtectedProxyPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiscraApi
            Path: /backend/{proxy+}
            Method: POST
        BackendProtectedProxyPut:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiscraApi
            Path: /backend/{proxy+}
            Method: PUT
        BackendProtectedProxyPatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiscraApi
            Path: /backend/{proxy+}
            Method: PATCH
        BackendProtectedProxyDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref DiscraApi
            Path: /backend/{proxy+}
            Method: DELETE
      Tags: { App: Discra, Env: dev }

Outputs:
  ApiId:
    Description: HTTP API ID
    Value: !Ref DiscraApi

  ApiEndpoint:
    Description: Base URL for the HTTP API (no stage suffix)
    Value: !GetAtt DiscraApi.ApiEndpoint

  HealthUrl:
    Description: Full URL for GET /health
    Value: !Sub
      - "${Endpoint}/dev/health"
      - { Endpoint: !GetAtt DiscraApi.ApiEndpoint }

  VersionUrl:
    Description: Full URL for GET /version
    Value: !Sub
      - "${Endpoint}/dev/version"
      - { Endpoint: !GetAtt DiscraApi.ApiEndpoint }

  AdminPingUrl:
    Description: Full URL for GET /admin/ping
    Value: !Sub
      - "${Endpoint}/dev/admin/ping"
      - { Endpoint: !GetAtt DiscraApi.ApiEndpoint }

  BackendHealthUrl:
    Description: Full URL for GET /backend/health
    Value: !Sub
      - "${Endpoint}/dev/backend/health"
      - { Endpoint: !GetAtt DiscraApi.ApiEndpoint }

  BackendVersionUrl:
    Description: Full URL for GET /backend/version
    Value: !Sub
      - "${Endpoint}/dev/backend/version"
      - { Endpoint: !GetAtt DiscraApi.ApiEndpoint }

  AdminUiUrl:
    Description: Full URL for Admin/Dispatcher web UI
    Value: !Sub
      - "${Endpoint}/dev/backend/ui/admin"
      - { Endpoint: !GetAtt DiscraApi.ApiEndpoint }

  DriverUiUrl:
    Description: Full URL for Driver web app
    Value: !Sub
      - "${Endpoint}/dev/backend/ui/driver"
      - { Endpoint: !GetAtt DiscraApi.ApiEndpoint }

  RegisterUiUrl:
    Description: Full URL for tenant registration web page
    Value: !Sub
      - "${Endpoint}/dev/backend/ui/register"
      - { Endpoint: !GetAtt DiscraApi.ApiEndpoint }

  ReviewUiUrl:
    Description: Full URL for App Dev review web page
    Value: !Sub
      - "${Endpoint}/dev/backend/ui/review"
      - { Endpoint: !GetAtt DiscraApi.ApiEndpoint }

  OrdersWebhookUrl:
    Description: Full URL for POST /backend/webhooks/orders
    Value: !Sub
      - "${Endpoint}/dev/backend/webhooks/orders"
      - { Endpoint: !GetAtt DiscraApi.ApiEndpoint }

  OrganizationsTableName:
    Description: DynamoDB table for tenant organization metadata
    Value: !Ref OrganizationsTable

  UsersTableName:
    Description: DynamoDB table for org users synced from Cognito claims
    Value: !Ref UsersTable

  OrdersTableName:
    Description: DynamoDB table for order + dispatch state
    Value: !Ref OrdersTable

  PodArtifactsTableName:
    Description: DynamoDB table for proof-of-delivery metadata
    Value: !Ref PodArtifactsTable

  PodArtifactsBucketName:
    Description: S3 bucket for POD photos/signatures uploads
    Value: !Ref PodArtifactsBucket

  DriverLocationsTableName:
    Description: DynamoDB table for latest driver GPS locations
    Value: !Ref DriverLocationsTable

  PushSubscriptionsTableName:
    Description: DynamoDB table for Web Push notification subscriptions
    Value: !Ref PushSubscriptionsTable

  SeatSubscriptionsTableName:
    Description: DynamoDB table for Stripe subscription + seat limits per org
    Value: !Ref SeatSubscriptionsTable

  SeatInvitationsTableName:
    Description: DynamoDB table for pending/accepted role invitations
